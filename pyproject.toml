[project]
name = "pvliesdonk-paperless-mcp"
version = "1.0.0"
description = "Paperless-NGX document management over MCP: search, tag, upload, and read documents; manage tags, correspondents, document types, and custom fields."
readme = "README.md"
license = "LicenseRef-Proprietary"  # starter: TODO update when you pick a license (see LICENSE)
requires-python = ">=3.11"
authors = [{ name = "pvliesdonk" }]
keywords = []
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: Other/Proprietary License",  # starter: TODO update when you pick a license (see LICENSE)
]
dependencies = [
    "fastmcp-pvl-core>=1.2.0,<2",
    "typer>=0.12",
    # PROJECT-DEPS-START — add domain dependencies below; kept across copier update
    "httpx>=0.27",
    "pydantic-settings>=2.4",
    # PROJECT-DEPS-END
]

[project.optional-dependencies]
# PROJECT-EXTRAS-START — add domain-specific optional-dependency groups below; kept across copier update
# PROJECT-EXTRAS-END

# Tooling lives under PEP 735 [dependency-groups] (not [project.optional-dependencies])
# so it never ships to PyPI consumers and never lands in the security-audit input.
[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "diff-cover>=9",
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=3",
    "pip-audit>=2.7",
    "respx>=0.21",
]

docs = [
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=0.28",
    "mkdocs-llmstxt>=0.5",
]

[project.scripts]
paperless-mcp = "paperless_mcp.cli:main"

[project.urls]
Repository = "https://github.com/pvliesdonk/paperless-mcp"
Documentation = "https://pvliesdonk.github.io/paperless-mcp/"
Issues = "https://github.com/pvliesdonk/paperless-mcp/issues"
Changelog = "https://github.com/pvliesdonk/paperless-mcp/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/paperless_mcp"]

[tool.ruff]
target-version = "py311"
line-length = 88
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "B", "C4", "UP", "ARG", "SIM", "TCH", "PTH", "RUF",
]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
