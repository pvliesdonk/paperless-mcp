[tool.ruff.lint.isort]
known-first-party = ["paperless_mcp"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--strict-markers", "-ra"]
asyncio_mode = "auto"
markers = [
    "integration: live Paperless-NGX integration tests (opt-in)",
]

[tool.coverage.run]
source = ["src/paperless_mcp"]
branch = true

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["fastmcp_pvl_core", "fastmcp_pvl_core.*"]
ignore_missing_imports = true

# Relax strict typing for the existing test suite — predates the template's
# mypy-on-tests expansion.  Newly scaffolded tests (tests/test_cli.py) remain
# fully typed; legacy unit tests can be annotated incrementally.  Module
# names are unqualified (e.g. `client.test_documents_read`) because
# `tests/` and `tests/unit/` have no `__init__.py`, so mypy resolves
# packages starting from the nearest `__init__.py` directory.
[[tool.mypy.overrides]]
module = [
    "client.*",
    "models.*",
    "resources.*",
    "tools.*",
    "integration.*",
]
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false


[tool.pyright]
# Point Pyright at the uv-managed venv so editor diagnostics resolve
# imports the same way as our CLI tools (mypy/ruff/pytest run via uv).
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"
# src-layout editable installs use a .pth shim that Pyright does not execute;
# point Pyright at src/ directly so IDE import resolution matches runtime.
extraPaths = ["src"]

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
commit_parser = "angular"
tag_format = "v{version}"
# Bump versioned manifests (server.json) inside the release commit rather
# than in a follow-up commit + force-retag.  Extend scripts/bump_manifests.py
# if your project adds more lockstep manifests (plugin.json, .mcp.json, ...).
build_command = "python scripts/bump_manifests.py"
# PSR stages and commits files listed in `assets` together with pyproject.toml
# and CHANGELOG.md, so the release tag points at a single commit containing
# all version-coupled files.  Add ".claude-plugin/plugin/.claude-plugin/plugin.json"
# and ".claude-plugin/plugin/.mcp.json" once your project scaffolds them.
assets = [
    "server.json",
]

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
